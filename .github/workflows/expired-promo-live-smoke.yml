name: Expired Promo Live Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  expired-promo-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Expired Promo Denial Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/expired-promo-denial.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Expired Promo Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expired-promo-live-smoke-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14
