name: Ops Health Dashboard

on:
  schedule:
    - cron: '6 13 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  ops-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Collect ops health
        env:
          BASE_URL: https://speaksharp-public.vercel.app
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          # Prod monitoring → LIVE Stripe (the deployed app runs live keys). Source the
          # live mode-scoped secrets so the live key can read the live price/webhook objects.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_LIVE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_LIVE_WEBHOOK_SECRET }}
          # NOTE: no STRIPE_LIVE_BASIC_PRICE_ID exists yet; the generic basic price is test-mode,
          # so the basic-price check reports degraded under the live key until a live basic price
          # secret is added (Basic tier not live-launched). Pro is split and remapped below.
          STRIPE_BASIC_PRICE_ID: ${{ secrets.STRIPE_BASIC_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_LIVE_PRO_PRICE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_API_BASE: ${{ secrets.SENTRY_API_BASE }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          POSTHOG_API_HOST: ${{ vars.POSTHOG_API_HOST }}
          POSTHOG_INGEST_HOST: ${{ vars.POSTHOG_INGEST_HOST }}
          POSTHOG_PROJECT_API_KEY: ${{ vars.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          PROMO_GEN_ADMIN_SECRET: ${{ secrets.PROMO_GEN_ADMIN_SECRET }}
          OBSERVABILITY_SMOKE_SECRET: ${{ secrets.OBSERVABILITY_SMOKE_SECRET }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
        run: pnpm ops:health

      - name: Publish summary
        if: always()
        run: cat ops-health/ops-health.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish latest public ops summary
        if: always()
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/publish-ops-health-summary.mjs

      - name: Upload ops health artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ops-health-dashboard
          path: ops-health/
          retention-days: 14
