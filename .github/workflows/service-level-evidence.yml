name: Service-Level Evidence

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  service-level-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Setup test users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          MODE: "soak"
          NEW_FREE_COUNT: "0"
          NEW_BASIC_COUNT: "0"
          NEW_PRO_COUNT: "0"
        run: node scripts/setup-test-users.mjs

      - name: Fetch software quality evidence from CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p product_release/evidence

          CI_RUN_ID=""
          for attempt in {1..20}; do
            CI_RUN_ID=$(gh run list \
              --workflow ci.yml \
              --commit "$GITHUB_SHA" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // empty')

            if [ -n "$CI_RUN_ID" ]; then
              break
            fi

            echo "CI software-quality evidence is not ready for ${GITHUB_SHA} yet; waiting..."
            sleep 30
          done

          if [ -z "$CI_RUN_ID" ]; then
            echo "No successful CI metrics artifact found for ${GITHUB_SHA}; service-level evidence will mark quality checks as missing."
            exit 0
          fi

          echo "Downloading CI metrics artifact from run ${CI_RUN_ID}."
          if ! gh run download "$CI_RUN_ID" --name ci-metrics --dir /tmp/speaksharp-ci-metrics; then
            echo "Unable to download ci-metrics from CI run ${CI_RUN_ID}; service-level evidence will mark quality checks as missing."
            exit 0
          fi

          cp /tmp/speaksharp-ci-metrics/product_release/evidence/software-quality.latest.json product_release/evidence/ 2>/dev/null || true
          cp /tmp/speaksharp-ci-metrics/product_release/evidence/software-quality-summary.latest.md product_release/evidence/ 2>/dev/null || true
          ls -la product_release/evidence

      - name: Collect ops health snapshot
        continue-on-error: true
        env:
          BASE_URL: https://speaksharp-public.vercel.app
          GITHUB_TOKEN: ${{ github.token }}
          VERCEL_ACCESS_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID || secrets.VERCEL_ORG_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_BASIC_PRICE_ID: ${{ secrets.STRIPE_BASIC_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_API_BASE: ${{ secrets.SENTRY_API_BASE }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          POSTHOG_API_HOST: ${{ secrets.POSTHOG_API_HOST }}
          POSTHOG_INGEST_HOST: ${{ secrets.POSTHOG_INGEST_HOST }}
          POSTHOG_PROJECT_API_KEY: ${{ secrets.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          PROMO_GEN_ADMIN_SECRET: ${{ secrets.PROMO_GEN_ADMIN_SECRET }}
          OBSERVABILITY_SMOKE_SECRET: ${{ secrets.OBSERVABILITY_SMOKE_SECRET }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
        run: pnpm ops:health

      - name: Run backend stress check
        env:
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          API_LOAD_CONCURRENCY: "15"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm test:stress:backend

      - name: Run browser endurance check
        env:
          VITE_TEST_MODE: "true"
          VITE_USE_LIVE_DB: "true"
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DURATION=$(grep "const SOAK_MEMORY_DURATION_MS =" tests/constants.ts | grep -oE "[0-9]+;" | tr -d ";")
          echo "Extracted browser endurance duration: $DURATION ms"
          SOAK_MEMORY_DURATION_MS=$DURATION pnpm test:endurance:browser

      - name: Generate service-level evidence
        if: always()
        run: pnpm metrics:service-levels

      - name: Publish service-level summary
        if: always()
        run: cat product_release/evidence/service-levels-summary.latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload service-level evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: service-level-evidence
          path: |
            product_release/evidence/
            test-results/stress/
            test-results/endurance/
            ops-health/
          retention-days: 14
