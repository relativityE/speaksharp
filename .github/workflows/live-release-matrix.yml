name: Live Release Matrix

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        required: true
        default: all
        type: choice
        options:
          - all
          - custom-words
          - native-preflight
          - cloud-token-gates
          - cloud-artifact
          - stt-switching-contract
          - private-cache
          - first-time-tester-private-trial
          - stripe-webhook-readiness
          - stripe-checkout-readiness
          - stripe-price-audit
      zero_hf_audit:
        description: 'Require Private model requests to stay same-origin /models with no HuggingFace traffic'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  live-custom-words:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'custom-words' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Live Custom Words Persistence
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          BASIC_TEST_EMAIL: ${{ secrets.BASIC_TEST_EMAIL }}
          BASIC_TEST_PASSWORD: ${{ secrets.BASIC_TEST_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/user-filler-words-persistence.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Custom Words Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-custom-words-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-native-preflight:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'native-preflight' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Native Live Preflight Probe
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/analytics-live-native-probe.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Native Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-native-preflight-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-cloud-token-gates:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'cloud-token-gates' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Cloud Token Gate Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/cloud-token-gates.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Cloud Token Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-cloud-token-gates-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-cloud-artifact:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'cloud-artifact' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: live-cloud-assemblyai-streaming
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Cloud Live Artifact Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        # Cloud streaming is provider-limited. Keep one smoke, one worker, no immediate retries.
        # After AssemblyAI 1008/3009 "Too many concurrent sessions", wait 5-10 minutes before rerun.
        run: pnpm exec playwright test tests/live/cloud-artifact.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload Cloud Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-cloud-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stt-switching-contract:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'stt-switching-contract' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: live-stt-switching-contract
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Live STT Switching Contract
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/stt-switching-contract.live.spec.ts --config=playwright.deployed-live.config.ts --project=deployed-live-chromium --reporter=list --workers=1

      - name: Upload STT Switching Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-stt-switching-contract-artifacts
          path: |
            blob-report/deployed-live/
            playwright-report/deployed-live/
            test-results/deployed-live/
          retention-days: 14

  live-private-cache:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'private-cache' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Private Cache First/Second Start Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
          ZERO_HF_AUDIT_REQUIRED: ${{ github.event.inputs.zero_hf_audit || 'false' }}
        run: pnpm exec playwright test tests/live/private-cache.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload Private Cache Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-private-cache-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-first-time-tester-private-trial:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'first-time-tester-private-trial' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run First-Time Tester Private Trial Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/first-time-tester-private-trial.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload First-Time Tester Private Trial Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-first-time-tester-private-trial-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stripe-webhook-readiness:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'stripe-webhook-readiness' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Run Stripe Webhook Readiness Proof
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: pnpm exec playwright test tests/live/stripe-webhook-readiness.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Stripe Webhook Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-stripe-webhook-readiness-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stripe-checkout-readiness:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'stripe-checkout-readiness' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Run Stripe Checkout Readiness Proof
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
        run: pnpm exec playwright test tests/live/stripe-checkout-readiness.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Stripe Checkout Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-stripe-checkout-readiness-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stripe-price-audit:
    if: ${{ github.event.inputs.suite == 'all' || github.event.inputs.suite == 'stripe-price-audit' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Audit Stripe Price Configuration
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_BASIC_PRICE_ID: ${{ secrets.STRIPE_BASIC_PRICE_ID }}
          STRIPE_PRO_PRICE_ID: ${{ secrets.STRIPE_PRO_PRICE_ID }}
          EXPECTED_STRIPE_BASIC_AMOUNT: '499'
          EXPECTED_STRIPE_PRO_AMOUNT: '999'
          EXPECTED_STRIPE_BASIC_CURRENCY: usd
          EXPECTED_STRIPE_PRO_CURRENCY: usd
          EXPECTED_STRIPE_BASIC_INTERVAL: month
          EXPECTED_STRIPE_PRO_INTERVAL: month
        run: node scripts/stripe-price-audit.mjs
