name: Live Release Matrix

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.promo.outputs.code }}
    steps:
      - name: Generate Live Promo Code
        id: promo
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PROMO_GEN_ADMIN_SECRET: ${{ secrets.PROMO_GEN_ADMIN_SECRET }}
        run: |
          set -euo pipefail

          HTTP_STATUS=$(curl -sS -o /tmp/promo_response.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/functions/v1/apply-promo/generate" \
            -H "Content-Type: application/json" \
            -H "X-Promo-Admin-Key: ${PROMO_GEN_ADMIN_SECRET}" \
            -d '{}')

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Promo generation failed with HTTP $HTTP_STATUS"
            cat /tmp/promo_response.json
            exit 1
          fi

          CODE=$(jq -r '.code' /tmp/promo_response.json)
          if [ -z "$CODE" ] || [ "$CODE" = "null" ]; then
            echo "Promo generation did not return a code"
            cat /tmp/promo_response.json
            exit 1
          fi

          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Generated one-time promo code for this live matrix run." >> "$GITHUB_STEP_SUMMARY"

  live-custom-words:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Live Custom Words Persistence
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          E2E_FREE_EMAIL: ${{ secrets.E2E_FREE_EMAIL }}
          E2E_FREE_PASSWORD: ${{ secrets.E2E_FREE_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/user-filler-words-persistence.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Custom Words Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-custom-words-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-native-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Native Live Preflight Probe
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          E2E_PRO_EMAIL: ${{ secrets.E2E_PRO_EMAIL }}
          E2E_PRO_PASSWORD: ${{ secrets.E2E_PRO_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/analytics-live-native-probe.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Native Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-native-preflight-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-cloud-token-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Cloud Token Gate Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/cloud-token-gates.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Cloud Token Gate Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-cloud-token-gates-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-promo-throttle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Promo Throttle Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/promo-throttle.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Promo Throttle Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-promo-throttle-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-expired-promo-denial:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Expired Promo Denial Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/expired-promo-denial.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Expired Promo Denial Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-expired-promo-denial-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-cloud-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: live-cloud-assemblyai-streaming
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Cloud Live Artifact Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          E2E_PRO_EMAIL: ${{ secrets.E2E_PRO_EMAIL }}
          E2E_PRO_PASSWORD: ${{ secrets.E2E_PRO_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        # Cloud streaming is provider-limited. Keep one smoke, one worker, no immediate retries.
        # After AssemblyAI 1008/3009 "Too many concurrent sessions", wait 5-10 minutes before rerun.
        run: pnpm exec playwright test tests/live/cloud-artifact.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload Cloud Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-cloud-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-private-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Private Cache First/Second Start Proof
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          E2E_PRO_EMAIL: ${{ secrets.E2E_PRO_EMAIL }}
          E2E_PRO_PASSWORD: ${{ secrets.E2E_PRO_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/private-cache.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload Private Cache Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-private-cache-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stripe-webhook-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Run Stripe Webhook Readiness Proof
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: pnpm exec playwright test tests/live/stripe-webhook-readiness.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Stripe Webhook Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-stripe-webhook-readiness-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-stripe-checkout-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Run Stripe Checkout Readiness Proof
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          E2E_PRO_EMAIL: ${{ secrets.E2E_PRO_EMAIL }}
          E2E_PRO_PASSWORD: ${{ secrets.E2E_PRO_PASSWORD }}
        run: pnpm exec playwright test tests/live/stripe-checkout-readiness.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Stripe Checkout Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-stripe-checkout-readiness-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14

  live-promo-private-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: generate-promo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run Promo Pro Private Artifact Trace
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          BASE_URL: https://speaksharp-public.vercel.app/
          PROMO_CODE: ${{ needs.generate-promo.outputs.code }}
        run: pnpm exec playwright test tests/live/promo-pro-artifacts.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list

      - name: Upload Promo Private Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: live-promo-private-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14
