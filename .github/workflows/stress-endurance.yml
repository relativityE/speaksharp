name: Stress and Endurance

on:
  workflow_dispatch:
    inputs:
      new_free_count:
        description: 'Free Users'
        required: false
        default: '0'
        type: string
      new_basic_count:
        description: 'Legacy alias for Free Users'
        required: false
        default: '0'
        type: string
      new_pro_count:
        description: 'Pro Users'
        required: false
        default: '0'
        type: string
  schedule:
    - cron: '0 4 * * *' # Every day at 4 AM UTC

jobs:
  run-stress-endurance:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Setup test users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          MODE: "soak"
          NEW_FREE_COUNT: ${{ github.event.inputs.new_free_count || github.event.inputs.new_basic_count || '0' }}
          NEW_BASIC_COUNT: ${{ github.event.inputs.new_basic_count || '0' }}
          NEW_PRO_COUNT: ${{ github.event.inputs.new_pro_count || '0' }}
        run: node scripts/setup-test-users.mjs
      
      - name: Run backend stress check
        env:
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          API_LOAD_CONCURRENCY: "15"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: pnpm test:stress:backend

      - name: Run browser endurance check
        env:
          VITE_TEST_MODE: "true"
          VITE_USE_LIVE_DB: "true"
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DURATION=$(grep "const SOAK_MEMORY_DURATION_MS =" tests/constants.ts | grep -oE "[0-9]+;" | tr -d ";")
          echo "Extracted browser endurance duration: $DURATION ms"
          SOAK_MEMORY_DURATION_MS=$DURATION pnpm test:endurance:browser

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: stress-endurance-results
          path: |
            test-results/stress/
            test-results/endurance/
            test-results/soak/
            test-results/soak-report/
          retention-days: 7
