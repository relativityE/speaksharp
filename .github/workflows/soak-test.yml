name: Soak Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *' # Every day at 4 AM UTC

jobs:
  run-soak-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Setup test users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          MODE: "soak"
        run: node scripts/setup-test-users.mjs
      
      - name: Run soak test
        env:
          VITE_TEST_MODE: "true"
          VITE_USE_LIVE_DB: "true"
          SOAK_TEST_PASSWORD: ${{ secrets.SOAK_TEST_PASSWORD }}
          SOAK_TEST_DURATION_MS: "300000" # 5 minutes (configurable here or via UI inputs if added)
          API_LOAD_CONCURRENCY: "15"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
        run: |
          pnpm test:soak

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-test-results
          path: |
            test-results/soak/
            test-results/soak-report/
          retention-days: 7
