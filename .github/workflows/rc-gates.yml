name: Release Candidate Gates

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production or preview URL for live/UX gates
        required: false
        default: https://speaksharp-public.vercel.app
      stripe_webhook_secret_sha256:
        description: Optional Supabase STRIPE_WEBHOOK_SECRET SHA-256 digest for equality proof
        required: false
        default: a3f5b0be67a3e8c24d7eaae36deef5649dba96fa18d00e4ef6fdeb05309ad937
      gate:
        description: Gate to run
        required: true
        default: all
        type: choice
        options:
          - all
          - gate-1-product
          - gate-2-sast
          - gate-3-dast
          - gate-4-sca
          - gate-5-ux
      diagnostic_dast_spec:
        description: 'DIAGNOSTIC ONLY — run a single live-DAST spec file for root-cause classification (e.g. tests/live/stt-switching-contract.live.spec.ts). EMPTY = full Gate 3 unchanged. A diagnostic run is NOT a Gate 3 pass.'
        required: false
        default: ''
      diagnostic_dast_grep:
        description: 'DIAGNOSTIC ONLY — restrict the single spec to tests matching this title (used with diagnostic_dast_spec).'
        required: false
        default: ''
      paid_launch:
        description: "Set to 'true' to ALSO run the PAID Stripe live-readiness specs in Gate 3 (checkout / webhook / billing-portal). Default empty = CONTROLLED non-paid scope: paid Stripe readiness is a separate paid-launch concern and does NOT gate the controlled soft release."
        required: false
        default: ''

permissions:
  contents: read

jobs:
  gate-1-product:
    name: Gate 1 - Product Truth
    if: ${{ github.event.inputs.gate == 'all' || github.event.inputs.gate == 'gate-1-product' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'
      - name: Run Product Truth Gate
        env:
          # Public Supabase build env (required by validate-env/build:test).
          # Non-secret client values; never the service-role key.
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EDGE_FN_URL: ${{ vars.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          STT_ENGINE: mock
        run: pnpm rc:gate:1:product

  gate-2-sast:
    name: Gate 2 - SAST / OWASP Code Review
    if: ${{ github.event.inputs.gate == 'all' || github.event.inputs.gate == 'gate-2-sast' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run SAST Gate
        run: pnpm rc:gate:2:sast

  gate-3-dast:
    name: Gate 3 - DAST / Running App
    if: ${{ github.event.inputs.gate == 'all' || github.event.inputs.gate == 'gate-3-dast' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'
      - name: Run DAST Local Gate
        if: ${{ github.event.inputs.diagnostic_dast_spec == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          EDGE_FN_URL: ${{ vars.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
        run: pnpm rc:dast:local
      - name: Verify Stripe Webhook Secret Digest
        if: ${{ github.event.inputs.diagnostic_dast_spec == '' }}
        env:
          SECRET_DIGEST_LABEL: STRIPE_WEBHOOK_SECRET
          SECRET_VALUE: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          EXPECTED_SHA256: ${{ github.event.inputs.stripe_webhook_secret_sha256 }}
        run: node scripts/verify-secret-digest.mjs
      - name: Verify live test-user profile rows
        if: ${{ github.event.inputs.diagnostic_dast_spec == '' }}
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FREE_TEST_EMAIL: ${{ secrets.FREE_TEST_EMAIL || secrets.BASIC_TEST_EMAIL }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
        run: pnpm verify:test-users
      - name: Run DAST Live Gate
        if: ${{ github.event.inputs.diagnostic_dast_spec == '' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FREE_TEST_EMAIL: ${{ secrets.FREE_TEST_EMAIL || secrets.BASIC_TEST_EMAIL }}
          FREE_TEST_PASSWORD: ${{ secrets.FREE_TEST_PASSWORD || secrets.BASIC_TEST_PASSWORD }}
          BASIC_TEST_EMAIL: ${{ secrets.BASIC_TEST_EMAIL }}
          BASIC_TEST_PASSWORD: ${{ secrets.BASIC_TEST_PASSWORD }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          EDGE_FN_URL: ${{ vars.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
        run: pnpm rc:dast:live
      # PAID Stripe live-readiness (checkout/webhook/billing-portal) is a SEPARATE paid-launch
      # concern (release-owner 2026-06-18). It does NOT gate the controlled non-paid soft release
      # and runs only when paid_launch == 'true'. Requires the four-corner live Stripe alignment
      # (Vercel pk_live + Supabase sk_live/whsec/SITE_URL + valid live customer) — see
      # product_release/LAUNCH_ENV_CHECKLIST.md §1. A controlled-scope run leaves these unrun.
      - name: Run DAST Live Gate — PAID Stripe readiness (paid-launch scope only)
        if: ${{ github.event.inputs.diagnostic_dast_spec == '' && github.event.inputs.paid_launch == 'true' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || secrets.STRIPE_PUBLISHABLE_KEY }}
          # Generic STRIPE_WEBHOOK_SECRET stays TEST-only (unchanged). The paid webhook-readiness
          # spec signs with STRIPE_LIVE_WEBHOOK_SECRET (the LIVE endpoint whsec, Ops-created) so the
          # signature matches the deployed Supabase live verifier; the spec fails fast if it's absent.
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_LIVE_WEBHOOK_SECRET: ${{ secrets.STRIPE_LIVE_WEBHOOK_SECRET }}
          FREE_TEST_EMAIL: ${{ secrets.FREE_TEST_EMAIL || secrets.BASIC_TEST_EMAIL }}
          FREE_TEST_PASSWORD: ${{ secrets.FREE_TEST_PASSWORD || secrets.BASIC_TEST_PASSWORD }}
          BASIC_TEST_EMAIL: ${{ secrets.BASIC_TEST_EMAIL }}
          BASIC_TEST_PASSWORD: ${{ secrets.BASIC_TEST_PASSWORD }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          # stripe-checkout-readiness resolves CHECKOUT_TEST_EMAIL FIRST (then FREE/BASIC/PRO).
          # Expose it so the paid checkout proof authenticates as the dedicated checkout-live-proof
          # user (clean live-mode customer) instead of silently falling back to FREE_TEST_EMAIL.
          CHECKOUT_TEST_EMAIL: ${{ secrets.CHECKOUT_TEST_EMAIL }}
          CHECKOUT_TEST_PASSWORD: ${{ secrets.CHECKOUT_TEST_PASSWORD }}
          EDGE_FN_URL: ${{ vars.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
        run: pnpm rc:gate:3:dast:paid
      - name: Run DAST Live Gate (DIAGNOSTIC single spec — NOT a Gate 3 pass)
        if: ${{ github.event.inputs.diagnostic_dast_spec != '' }}
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY || secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          FREE_TEST_EMAIL: ${{ secrets.FREE_TEST_EMAIL || secrets.BASIC_TEST_EMAIL }}
          FREE_TEST_PASSWORD: ${{ secrets.FREE_TEST_PASSWORD || secrets.BASIC_TEST_PASSWORD }}
          BASIC_TEST_EMAIL: ${{ secrets.BASIC_TEST_EMAIL }}
          BASIC_TEST_PASSWORD: ${{ secrets.BASIC_TEST_PASSWORD }}
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
          EDGE_FN_URL: ${{ vars.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          DIAGNOSTIC_DAST_SPEC: ${{ github.event.inputs.diagnostic_dast_spec }}
          DIAGNOSTIC_DAST_GREP: ${{ github.event.inputs.diagnostic_dast_grep }}
        run: |
          echo "DIAGNOSTIC_SINGLE_SPEC=true"
          echo "::warning::DIAGNOSTIC single-spec run — NOT a full Gate 3 pass. Release gate stays FAIL until a full Gate 3 run (no diagnostic input) passes."
          echo "spec=$DIAGNOSTIC_DAST_SPEC grep=${DIAGNOSTIC_DAST_GREP:-<none>}"
          node scripts/rc-dast-live-preflight.mjs
          if [ -n "$DIAGNOSTIC_DAST_GREP" ]; then
            VITE_USE_LIVE_DB=true pnpm exec playwright test "$DIAGNOSTIC_DAST_SPEC" --grep "$DIAGNOSTIC_DAST_GREP" --config=playwright.deployed-live.config.ts --project=deployed-live-chromium --reporter=line
          else
            VITE_USE_LIVE_DB=true pnpm exec playwright test "$DIAGNOSTIC_DAST_SPEC" --config=playwright.deployed-live.config.ts --project=deployed-live-chromium --reporter=line
          fi
      - name: Diagnostic single-spec notice (NOT a Gate 3 pass)
        if: ${{ always() && github.event.inputs.diagnostic_dast_spec != '' }}
        run: |
          {
            echo "### ⚠️ DIAGNOSTIC single-spec run — NOT a full Gate 3 pass"
            echo ""
            echo "- spec: \`${{ github.event.inputs.diagnostic_dast_spec }}\`"
            echo "- grep: \`${{ github.event.inputs.diagnostic_dast_grep }}\`"
            echo ""
            echo "Root-cause classification only. The release gate stays **FAIL** until a FULL Gate 3 (no diagnostic input) passes."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Gate 3 DAST artifacts (trace/screenshot/video/report)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gate-3-dast-artifacts
          path: |
            test-results/
            playwright-report/
            blob-report/
          retention-days: 14
          if-no-files-found: ignore

  gate-4-sca:
    name: Gate 4 - SCA / Dependency Review
    if: ${{ github.event.inputs.gate == 'all' || github.event.inputs.gate == 'gate-4-sca' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'
      - name: Run SCA Gate
        run: pnpm rc:gate:4:sca

  gate-5-ux:
    name: Gate 5 - UX Smoke
    if: ${{ github.event.inputs.gate == 'all' || github.event.inputs.gate == 'gate-5-ux' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'
      - name: Run UX Gate
        env:
          # Public Supabase build env (required by validate-env/build:test).
          # Non-secret client values; never the service-role key.
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          STT_ENGINE: mock
        run: pnpm rc:gate:5:ux
