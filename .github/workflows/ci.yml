name: "CI - Test Audit"

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'

      - name: Validate Environment Variables
        run: node scripts/validate-env.mjs

      - name: Run Prepare Stage
        run: pnpm ci:prepare

  unit-shard:
    name: unit-shard-${{ matrix.shard }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'

      - name: Run Unit Shard
        run: pnpm ci:unit:shard ${{ matrix.shard }} 4

      - name: Upload Unit Shard Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-shard-${{ matrix.shard }}-artifacts
          path: |
            test-results/unit
            unit-metrics.json
          retention-days: 30
          if-no-files-found: warn

  unit-coverage:
    name: unit-coverage
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'

      - name: Run Unit Coverage
        run: pnpm ci:unit

      - name: Upload Unit Artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: unit-artifacts
          path: |
            artifacts/coverage
            frontend/coverage
            unit-metrics.json
          retention-days: 30
          if-no-files-found: warn

  edge-tests:
    name: edge-tests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Edge Function Tests
        run: pnpm test:edge

  build:
    name: build
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'false'

      - name: Build Test App
        run: pnpm ci:build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: frontend/dist
          retention-days: 30

  health-check:
    name: health-check
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Download Build Artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: frontend/dist

      - name: Run Health Check Once
        env:
          STT_ENGINE: mock
        run: pnpm ci:health-check

      - name: Upload Health Check Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: health-check-report
          path: test-results/playwright-infra
          retention-days: 30
          if-no-files-found: error

  e2e:
    name: e2e-shard-${{ matrix.shard }}
    needs: [unit-shard, edge-tests, build, health-check]
    if: success()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Download Build Artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: frontend/dist

      - name: Run E2E Test Shard
        env:
          EDGE_FN_URL: ${{ secrets.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          STT_ENGINE: mock
        run: pnpm ci:test ${{ matrix.shard }}

      - name: Upload Shard Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: shard-report-${{ matrix.shard }}
          path: |
            blob-report
            test-results/playwright
          retention-days: 30
          if-no-files-found: warn

  lighthouse-advisory:
    name: lighthouse-advisory
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Download Build Artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: frontend/dist

      - name: Run Lighthouse CI Advisory
        run: |
          echo "=== Build artifacts check ==="
          ls -la frontend/ || echo "frontend/ not found"
          ls -la frontend/dist/ || echo "frontend/dist/ not found"

          echo "=== Port 4173 Status Check ==="
          lsof -i :4173 || echo "Port 4173 is available"

          mkdir -p lighthouse-results
          node scripts/generate-lhci-config.js
          npx lhci autorun || echo "⚠️ Lighthouse advisory failed; release gate continues."

          echo "=== LHCI Results Debug ==="
          ls -R lighthouse-results || echo "Directory empty or missing"

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-report
          path: lighthouse-results/
          retention-days: 30
          if-no-files-found: warn

  report:
    name: report
    needs: [unit-shard, unit-coverage, edge-tests, build, health-check, e2e, lighthouse-advisory]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Download All Artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: List Artifacts
        run: ls -R artifacts

      - name: Organize Canonical Artifacts
        run: |
          mkdir -p artifacts/coverage artifacts/playwright artifacts/lighthouse artifacts/metrics frontend

          if [ -d "artifacts/build-artifacts" ]; then
            mkdir -p frontend/dist
            cp -r artifacts/build-artifacts/* frontend/dist/
          fi

          if [ -d "artifacts/unit-artifacts/artifacts/coverage" ]; then
            cp -r artifacts/unit-artifacts/artifacts/coverage/* artifacts/coverage/ 2>/dev/null || true
          fi
          if [ -d "artifacts/unit-artifacts/frontend/coverage" ]; then
            cp -r artifacts/unit-artifacts/frontend/coverage/* artifacts/coverage/ 2>/dev/null || true
          fi
          cp artifacts/unit-artifacts/unit-metrics.json artifacts/metrics/ 2>/dev/null || true
          cp artifacts/unit-artifacts/unit-metrics.json . 2>/dev/null || true

          find artifacts -type f -name 'report-*.zip' | while read report; do
            shard_num=$(basename "$report" .zip | sed 's/report-//')
            mkdir -p artifacts/playwright/shard-${shard_num}
            cp "$report" artifacts/playwright/shard-${shard_num}/
          done

          if [ -d "artifacts/lighthouse-report" ]; then
            cp -r artifacts/lighthouse-report/* artifacts/lighthouse/ 2>/dev/null || true
          fi

          echo "✅ Canonical artifacts organized in /artifacts"
          ls -R artifacts/

      - name: Merge E2E Reports
        run: |
          mkdir -p test-results/playwright artifacts/playwright-merge
          find artifacts/playwright -type f -name '*.zip' -exec cp {} artifacts/playwright-merge/ \;

          if [ "$(find artifacts/playwright-merge -type f -name '*.zip' | wc -l)" -gt 0 ]; then
            pnpm exec playwright merge-reports --reporter json,html artifacts/playwright-merge > test-results/playwright/results.json
            echo "✅ Merged E2E report saved to test-results/playwright/results.json"
          else
            echo "⚠️ No E2E reports to merge"
          fi

      - name: Generate Final Report
        run: pnpm ci:report:github

      - name: Aggregate CI Metrics
        run: node scripts/aggregate-ci.mjs

      - name: Report CI Timing And Failures
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/report-ci-timing.mjs

      - name: Upload CI Metrics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-metrics
          path: |
            artifacts/ci-metrics.json
            artifacts/ci-wall-clock.json
            artifacts/ci-job-timing.json
            product_release/evidence/software-quality.latest.json
            product_release/evidence/software-quality-summary.latest.md
          retention-days: 30
          if-no-files-found: warn

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn
