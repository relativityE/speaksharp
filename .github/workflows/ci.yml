name: "CI - Test Audit"

permissions:
  contents: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Validate Environment Variables
        run: node scripts/validate-env.mjs

      - name: Run Prepare Stage
        run: pnpm ci:prepare

      - name: Upload Prepare Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts
          path: |
            frontend/dist
            frontend/coverage
            unit-metrics.json

  test:
    needs: prepare
    if: success()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Allow all shards to complete even if one fails
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Download Prepare Artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-artifacts
          path: .

      - name: Run E2E Test Shard
        env:
          EDGE_FN_URL: ${{ secrets.EDGE_FN_URL }}
          AGENT_SECRET: ${{ secrets.AGENT_SECRET }}
          STT_ENGINE: mock
        run: pnpm ci:test ${{ matrix.shard }}

      - name: Upload Shard Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 30

  lighthouse:
    needs: [prepare, test]
    if: success() || failure() # Run even if E2E tests fail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          mkdir -p artifacts
          ls -R artifacts

      - name: Verify Artifacts
        run: ./scripts/verify-artifacts.sh --path artifacts/all-artifacts build metrics

      - name: Restore Build Artifacts
        run: |
          mkdir -p frontend
          # Support both flattened and preserved structures
          if [ -d "artifacts/all-artifacts/frontend/dist" ]; then
            cp -r artifacts/all-artifacts/frontend/dist frontend/
          elif [ -d "artifacts/all-artifacts/dist" ]; then
            cp -r artifacts/all-artifacts/dist frontend/
          fi
          
          if [ -d "artifacts/all-artifacts/frontend/coverage" ]; then
            cp -r artifacts/all-artifacts/frontend/coverage frontend/
          elif [ -d "artifacts/all-artifacts/coverage" ]; then
            cp -r artifacts/all-artifacts/coverage frontend/
          fi
          
          cp artifacts/all-artifacts/unit-metrics.json . 2>/dev/null || true
          # test-results is only in shard artifacts, not all-artifacts
          [ -d artifacts/all-artifacts/test-results ] && cp -r artifacts/all-artifacts/test-results . || echo "No test-results in all-artifacts (expected)"



      - name: Run Lighthouse CI
        run: |
          # Debug: Verify build artifacts exist
          echo "=== Build artifacts check ==="
          ls -la frontend/ || echo "frontend/ not found"
          ls -la frontend/dist/ || echo "frontend/dist/ not found"
          
          # Debug: Verify preview command works (in subshell to preserve cwd)
          # Preview server test removed to prevent port conflicts
          # User Request: "Print port in use each time"
          echo "=== Port 4173 Status Check ==="
          lsof -i :4173 || echo "Port 4173 is free"
          
          # Run LHCI
          mkdir -p lighthouse-results
          node scripts/generate-lhci-config.js
          npx lhci autorun
          
          echo "=== LHCI Results Debug ==="
          ls -R lighthouse-results || echo "Directory empty or missing"

      - name: Upload Lighthouse Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-results/
          retention-days: 30
          if-no-files-found: warn

  report:
    needs: [prepare, test, lighthouse]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          mkdir -p artifacts
          ls -R artifacts

      - name: Verify Artifacts
        run: ./scripts/verify-artifacts.sh --path artifacts/all-artifacts build metrics

      - name: Restore Build Artifacts
        run: |
          mkdir -p frontend
          if [ -d "artifacts/all-artifacts/frontend/dist" ]; then
            cp -r artifacts/all-artifacts/frontend/dist frontend/
          elif [ -d "artifacts/all-artifacts/dist" ]; then
            cp -r artifacts/all-artifacts/dist frontend/
          fi
          if [ -d "artifacts/all-artifacts/frontend/coverage" ]; then
            cp -r artifacts/all-artifacts/frontend/coverage frontend/
          elif [ -d "artifacts/all-artifacts/coverage" ]; then
            cp -r artifacts/all-artifacts/coverage frontend/
          fi
          cp artifacts/all-artifacts/unit-metrics.json . 2>/dev/null || true
          # test-results is only in shard artifacts, not all-artifacts
          [ -d artifacts/all-artifacts/test-results ] && cp -r artifacts/all-artifacts/test-results . || echo "No test-results in all-artifacts (expected)"

      - name: Organize Canonical Artifacts (Phase 6)
        run: |
          mkdir -p artifacts/coverage artifacts/playwright artifacts/lighthouse artifacts/metrics
          
          # 1. Restore Prepare Artifacts
          if [ -d "artifacts/all-artifacts" ]; then
            cp -r artifacts/all-artifacts/frontend/coverage/* artifacts/coverage/ 2>/dev/null || true
            cp artifacts/all-artifacts/unit-metrics.json artifacts/metrics/ 2>/dev/null || true
          fi
          
          # 2. Organize Shard Reports
          find artifacts -type f -name 'report-*.zip' | while read report; do
            shard_num=$(basename "$report" .zip | sed 's/report-//')
            mkdir -p artifacts/playwright/shard-${shard_num}
            cp "$report" artifacts/playwright/shard-${shard_num}/
          done
          
          # 3. Organize Lighthouse
          if [ -d "artifacts/lighthouse-report" ]; then
            cp -r artifacts/lighthouse-report/* artifacts/lighthouse/ 2>/dev/null || true
          fi

          echo "✅ Canonical artifacts organized in /artifacts"
          ls -R artifacts/

      - name: Merge E2E Reports
        run: |
          mkdir -p test-results/playwright
          if [ "$(find artifacts/playwright -type f -name '*.zip' | wc -l)" -gt 0 ]; then
            pnpm exec playwright merge-reports --reporter json,html artifacts/playwright > test-results/playwright/results.json
            echo "✅ Merged E2E report saved to test-results/playwright/results.json"
          else
            echo "⚠️ No E2E reports to merge"
          fi

      - name: Generate Final Report
        run: pnpm ci:report

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Commit Documentation Updates
        if: success() && github.event_name == 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(sqm): Update test audit metrics"
          branch: ${{ github.head_ref || github.ref_name }}
          file_pattern: 'docs/PRD.md'
