name: DB delete frozen set with promo cleanup (gated, Option A)

# Option A: scoped promo cleanup + auth delete for a FROZEN test-user delete set. For the exact frozen
# ids still existing, deletes their promo_attempts + promo_redemptions rows (untracked tables; NO
# global schema change), then deletes the auth users. ID-frozen — no classifier rerun. Fail-closed:
# exact confirm phrase, dry-run default, count guard + safety (no canary/Stripe/real-domain/issues),
# backup CSV first.

on:
  workflow_dispatch:
    inputs:
      frozen_ids_file:
        description: "Frozen id list (union of the 184 + 11 + 196)"
        type: string
        default: scripts/data/final-delete-set-ids.txt
      expected_remaining:
        description: "Exact still-existing targets expected"
        type: string
        required: true
      allow_real_domain:
        description: "Permit real-domain/redacted accounts (owner-reviewed junk only; Stripe still blocked)"
        type: choice
        options: ["false", "true"]
        default: "false"
      allow_stripe:
        description: "Permit Stripe-linked accounts (Pass B — ONLY after confirming test-mode/non-live in Stripe)"
        type: choice
        options: ["false", "true"]
        default: "false"
      mode:
        description: "dry-run (guard + counts + backup, no writes) or apply"
        type: choice
        options: [dry-run, apply]
        default: dry-run
      confirm:
        description: "DELETE-FROZEN-PROMO normally; DELETE-STRIPE-PROOF-TEST-ACCOUNTS when allow_stripe=true"
        type: string
        required: true

permissions:
  contents: read

jobs:
  delete-frozen-promo:
    name: Scoped promo cleanup + auth delete (gated)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Verify confirm phrase (fail-closed)
        env:
          ALLOW_STRIPE: ${{ inputs.allow_stripe }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          if [ "$ALLOW_STRIPE" = "true" ]; then
            # Pass B (deleting Stripe-linked accounts) needs its own distinct phrase.
            [ "$CONFIRM" = "DELETE-STRIPE-PROOF-TEST-ACCOUNTS" ] || { echo "::error::allow_stripe=true requires confirm=DELETE-STRIPE-PROOF-TEST-ACCOUNTS"; exit 1; }
          else
            [ "$CONFIRM" = "DELETE-FROZEN-PROMO" ] || { echo "::error::confirm phrase mismatch — aborting without any DB access."; exit 1; }
          fi

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run scoped promo cleanup + auth delete
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FROZEN_IDS_FILE: ${{ inputs.frozen_ids_file }}
          EXPECTED_REMAINING: ${{ inputs.expected_remaining }}
          DRY_RUN: ${{ inputs.mode == 'apply' && '0' || '1' }}
          ALLOW_REAL_DOMAIN: ${{ inputs.allow_real_domain == 'true' && '1' || '0' }}
          ALLOW_STRIPE: ${{ inputs.allow_stripe == 'true' && '1' || '0' }}
        run: node scripts/db-delete-frozen-promo.mjs

      - name: Upload affected-rows backup (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-delete-frozen-promo-backup
          path: db-delete-frozen-promo-backup.csv
          retention-days: 30
          if-no-files-found: ignore
