name: Deploy Edge Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v2
        env:
          SUPABASE_CLI_GITHUB_TOKEN: ${{ github.token }}
        with:
          version: latest

      - name: Deploy Edge Functions
        working-directory: backend
        run: |
          supabase functions deploy stripe-webhook --project-ref $PROJECT_ID --no-verify-jwt
          supabase functions deploy apply-promo --project-ref $PROJECT_ID
          supabase functions deploy check-usage-limit --project-ref $PROJECT_ID
          supabase functions deploy create-user --project-ref $PROJECT_ID --no-verify-jwt
          supabase functions deploy observability-smoke --project-ref $PROJECT_ID --no-verify-jwt
          supabase functions deploy assemblyai-token --project-ref $PROJECT_ID --no-verify-jwt
          supabase functions deploy get-ai-suggestions --project-ref $PROJECT_ID
          supabase functions deploy stripe-checkout --project-ref $PROJECT_ID
