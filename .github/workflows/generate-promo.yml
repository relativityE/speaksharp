name: Generate One-Time Promo Code

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-promo:
    runs-on: ubuntu-latest
    steps:
      - name: Generate One-Time Promo Code
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          PROMO_GEN_ADMIN_SECRET: ${{ secrets.PROMO_GEN_ADMIN_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_URL" ] || [ -z "$PROMO_GEN_ADMIN_SECRET" ]; then
            echo "❌ Missing SUPABASE_URL or PROMO_GEN_ADMIN_SECRET"
            exit 1
          fi

          HTTP_STATUS=$(curl -sS -o /tmp/promo_response.json -w "%{http_code}" \
            -X POST "${SUPABASE_URL}/functions/v1/apply-promo/generate" \
            -H "Content-Type: application/json" \
            -H "X-Promo-Admin-Key: ${PROMO_GEN_ADMIN_SECRET}" \
            -d '{}')

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ Promo generation failed with HTTP $HTTP_STATUS"
            cat /tmp/promo_response.json
            exit 1
          fi

          CODE=$(jq -r '.code' /tmp/promo_response.json)
          DURATION=$(jq -r '.duration_minutes' /tmp/promo_response.json)
          MAX_USES=$(jq -r '.max_uses' /tmp/promo_response.json)

          echo "✅ Promo Code Generated:"
          echo "------------------------------------------------"
          echo "Code:     $CODE"
          echo "Duration: $DURATION minutes"
          echo "Max Uses: $MAX_USES"
          echo "------------------------------------------------"

          {
            echo "### One-Time Promo Code"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Code | \`$CODE\` |"
            echo "| Duration | $DURATION minutes |"
            echo "| Max Uses | $MAX_USES |"
          } >> "$GITHUB_STEP_SUMMARY"
