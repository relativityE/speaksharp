name: Controlled STT Benchmarks

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday at 3am UTC — weekly is sufficient
  workflow_dispatch:        # Manual trigger before any engine version bump
    inputs:
      write_results:
        description: 'Write results to tests/STT_BENCHMARKS.json and open a PR'
        type: boolean
        default: true
      run_cloud_ceiling:
        description: 'Run the legacy AssemblyAI ceiling benchmark before the streaming A/B proof'
        type: boolean
        default: true
      streaming_ab_variants:
        description: 'Comma-separated AssemblyAI streaming A/B variants'
        type: string
        default: 'baseline,keyterms,prompt,prompt_keyterms'
      streaming_ab_fixtures:
        description: 'Comma-separated AssemblyAI streaming A/B fixture ids'
        type: string
        default: ''

jobs:
  benchmark-cloud:
    name: AssemblyAI Ceiling Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22' # Up-to-date node version
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate audio fixtures
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg
          bash scripts/generate-fixtures.sh

      - name: Run cloud STT ceiling benchmark
        id: cloud-ceiling
        continue-on-error: true
        if: inputs.run_cloud_ceiling != false
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          RUN_BENCHMARKS: 'true'
        run: pnpm benchmark:cloud

      - name: Run AssemblyAI streaming prompt/keyterms A/B proof
        env:
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          ASSEMBLYAI_STREAMING_AB_OUT: /tmp/assemblyai-streaming-ab-proof.json
          ASSEMBLYAI_STREAMING_AB_VARIANTS: ${{ inputs.streaming_ab_variants }}
          ASSEMBLYAI_STREAMING_AB_FIXTURES: ${{ inputs.streaming_ab_fixtures }}
        run: pnpm benchmark:cloud:streaming-ab

      - name: Upload AssemblyAI streaming A/B proof
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: assemblyai-streaming-ab-proof
          path: /tmp/assemblyai-streaming-ab-proof.json
          if-no-files-found: warn

      - name: Open PR with updated benchmarks
        if: success() && steps.cloud-ceiling.outcome == 'success' && inputs.write_results != false
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update AssemblyAI STT ceiling benchmark'
          title: '[benchmark] AssemblyAI ceiling measurement update'
          body: |
            Automated benchmark run. Review `tests/STT_BENCHMARKS.json` changes.
            If the new ceiling is lower than the previous, investigate before merging.
          branch: 'chore/benchmark-assemblyai'
          add-paths: tests/STT_BENCHMARKS.json

      - name: Fail if cloud ceiling benchmark regressed
        if: inputs.run_cloud_ceiling != false && steps.cloud-ceiling.outcome != 'success'
        run: |
          echo "Cloud ceiling benchmark failed; streaming A/B artifact was still collected for review."
          exit 1

  benchmark-private-browser:
    name: Private Browser Benchmarks (v2 + v4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium --with-deps

      - name: Generate audio fixtures
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak-ng ffmpeg
          bash scripts/generate-fixtures.sh

      - name: Run Private browser benchmark suite
        env:
          PRO_TEST_EMAIL: ${{ secrets.PRO_TEST_EMAIL }}
          PRO_TEST_PASSWORD: ${{ secrets.PRO_TEST_PASSWORD }}
        # Native Web Speech is intentionally excluded: it is browser-dependent
        # convenience STT, not a corpus-grade benchmark engine.
        run: pnpm exec playwright test tests/live/benchmark-cpu.live.spec.ts tests/live/benchmark-v4.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list
        timeout-minutes: 30  # 5 trials × 38s + WASM init headroom

      - name: Open PR with results
        if: success() && inputs.write_results != false
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update Private STT ceiling benchmarks'
          title: '[benchmark] Private STT ceiling measurement update'
          body: |
            Automated benchmark run for controlled Private STT engines.
            Native Web Speech is excluded from WER benchmarking by design.
          branch: 'chore/benchmark-browser'
          add-paths: tests/STT_BENCHMARKS.json
