name: Cloud Live Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: live-cloud-assemblyai-streaming
  cancel-in-progress: false

jobs:
  cloud-live-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Run One Serialized Cloud Live Smoke
        env:
          VITE_USE_LIVE_DB: 'true'
          VITE_SKIP_MSW: 'true'
          E2E_PRO_EMAIL: ${{ secrets.E2E_PRO_EMAIL }}
          E2E_PRO_PASSWORD: ${{ secrets.E2E_PRO_PASSWORD }}
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm exec playwright test tests/live/cloud-artifact.live.spec.ts --config=playwright.live.config.ts --project=live-stt-chromium --reporter=list --workers=1

      - name: Upload Cloud Smoke Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-live-smoke-artifacts
          path: |
            blob-report/live/
            playwright-report/
            test-results/live/
          retention-days: 14
