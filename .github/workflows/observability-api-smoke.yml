name: Observability API Smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Observability target'
        required: false
        default: all
        type: choice
        options:
          - all
          - frontend-sentry
          - edge-sentry
          - posthog
          - gate-b-posthog-targeting
          - gate-b-posthog-closeout

permissions:
  contents: read

jobs:
  sentry-frontend-dashboard:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'frontend-sentry' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Prove Sentry frontend ingest via Sentry API
        env:
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_API_BASE: ${{ secrets.SENTRY_API_BASE }}
          SENTRY_SEARCH_POLL_TIMEOUT_MS: 900000
        run: node scripts/live-observability-proof.mjs --target=frontend-sentry

  sentry-edge-dashboard:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'edge-sentry' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Prove Edge Function Sentry ingest via Sentry API
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          OBSERVABILITY_SMOKE_SECRET: ${{ secrets.OBSERVABILITY_SMOKE_SECRET }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_API_BASE: ${{ secrets.SENTRY_API_BASE }}
          SENTRY_SEARCH_POLL_TIMEOUT_MS: 900000
        run: node scripts/live-observability-proof.mjs --target=edge-sentry

  posthog-launch-event:
    if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'posthog' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Prove PostHog launch event via PostHog Query API
        env:
          POSTHOG_PROJECT_API_KEY: ${{ vars.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_INGEST_HOST: ${{ vars.POSTHOG_INGEST_HOST }}
          POSTHOG_API_HOST: ${{ vars.POSTHOG_API_HOST }}
          POSTHOG_POLL_TIMEOUT_MS: 900000
        run: node scripts/live-observability-proof.mjs --target=posthog

  gate-b-posthog-targeting:
    if: ${{ github.event.inputs.target == 'gate-b-posthog-targeting' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Inspect Gate B PostHog targeting
        env:
          GATEB_TEST_EMAIL: speaksharp-gateb-pro-20260611-1781209989779@speaksharp.app
          GATEB_APP_USER_ID: 22899590-4af1-4a0c-88d6-b00996cb5ae0
          POSTHOG_API_HOST: ${{ vars.POSTHOG_API_HOST }}
          POSTHOG_INGEST_HOST: ${{ vars.POSTHOG_INGEST_HOST }}
          POSTHOG_PROJECT_API_KEY: ${{ vars.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_ENVIRONMENT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
        run: node scripts/gate-b-posthog-targeting-proof.mjs

  gate-b-posthog-closeout:
    if: ${{ github.event.inputs.target == 'gate-b-posthog-closeout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Attempt Gate B PostHog operator targeting closeout
        env:
          GATEB_TEST_EMAIL: speaksharp-gateb-pro-20260611-1781209989779@speaksharp.app
          GATEB_APP_USER_ID: 22899590-4af1-4a0c-88d6-b00996cb5ae0
          POSTHOG_API_HOST: ${{ vars.POSTHOG_API_HOST }}
          POSTHOG_INGEST_HOST: ${{ vars.POSTHOG_INGEST_HOST }}
          POSTHOG_PROJECT_API_KEY: ${{ vars.POSTHOG_PROJECT_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_ENVIRONMENT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_GATEB_COHORT_ID: ${{ vars.POSTHOG_GATEB_COHORT_ID }}
          POSTHOG_GATEB_COHORT_NAME: v4_gateb_disposable_pro_testers
        run: node scripts/gate-b-posthog-closeout.mjs
