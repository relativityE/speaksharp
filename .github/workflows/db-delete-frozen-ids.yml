name: DB delete frozen ids (gated, ID-frozen)

# PRODUCTION delete of a FROZEN auth.users id list (ID-frozen — never re-derives the population via
# the state-dependent classifier). Deletes only frozen ids that still exist, with a count guard and
# safety checks (never the stable canary, never Stripe-linked, never real-domain). Retry-on-transient.
# Fail-closed: exact confirm phrase, dry-run default, backup CSV first.

on:
  workflow_dispatch:
    inputs:
      frozen_ids_file:
        description: "Path to the frozen id list (one uuid per line)"
        type: string
        default: scripts/data/phase2-delete-184-ids.txt
      expected_remaining:
        description: "Exact still-existing targets expected"
        type: string
        required: true
      label:
        description: "Label for the summary"
        type: string
        default: phase2-stragglers
      mode:
        description: "dry-run (guard + backup, no writes) or apply"
        type: choice
        options: [dry-run, apply]
        default: dry-run
      confirm:
        description: "Type DELETE-FROZEN-IDS to authorize"
        type: string
        required: true

permissions:
  contents: read

jobs:
  delete-frozen:
    name: Delete frozen ids (gated)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Verify confirm phrase (fail-closed)
        if: ${{ inputs.confirm != 'DELETE-FROZEN-IDS' }}
        run: |
          echo "::error::confirm phrase mismatch — aborting without any DB access."
          exit 1

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run ID-frozen delete
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FROZEN_IDS_FILE: ${{ inputs.frozen_ids_file }}
          EXPECTED_REMAINING: ${{ inputs.expected_remaining }}
          LABEL: ${{ inputs.label }}
          DRY_RUN: ${{ inputs.mode == 'apply' && '0' || '1' }}
        run: node scripts/db-delete-frozen-ids.mjs

      - name: Upload affected-rows backup (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-delete-frozen-ids-backup
          path: db-delete-frozen-ids-backup.csv
          retention-days: 30
          if-no-files-found: ignore
