name: DB diagnose delete blocker (read-only)

# READ-ONLY diagnostic for the persistent HTTP 500 on deleting the promo/codex/pl006 auth users.
# SELECT-only catalog introspection via the Supabase Management API. No mutations of any kind.

on:
  workflow_dispatch:
    inputs:
      frozen_ids_file:
        description: "Frozen id list to sample failed ids from"
        type: string
        default: scripts/data/phase2-delete-184-ids.txt

permissions:
  contents: read

jobs:
  diagnose:
    name: Delete-blocker diagnostic (read-only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run read-only diagnostic
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          FROZEN_IDS_FILE: ${{ inputs.frozen_ids_file }}
        run: node scripts/db-diagnose-delete-blocker.mjs
