name: Setup Test Users

on: 
  workflow_dispatch:
    inputs:
      user_type:
        description: 'User subscription type'
        required: true
        default: 'free'
        type: choice
        options:
          - free
          - pro
          - soak
      generate_password:
        description: 'Generate new shared password for soak users (soak only)'
        type: boolean
        default: false

jobs:
  setup-test-user:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate and set SOAK_TEST_PASSWORD (if requested)
        if: ${{ github.event.inputs.user_type == 'soak' && github.event.inputs.generate_password == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Generate a secure random password
          NEW_PASSWORD=$(openssl rand -base64 16 | tr -d '/+=' | head -c 20)
          echo "Generated new SOAK_TEST_PASSWORD"
          
          # Set it as a GitHub secret
          gh secret set SOAK_TEST_PASSWORD --body "$NEW_PASSWORD"
          echo "✅ SOAK_TEST_PASSWORD secret updated via GitHub API"
          
          # Export for use in this workflow run
          echo "SOAK_TEST_PASSWORD=$NEW_PASSWORD" >> $GITHUB_ENV

      - name: Setup test users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOAK_TEST_PASSWORD: ${{ env.SOAK_TEST_PASSWORD || secrets.SOAK_TEST_PASSWORD }}
          USER_TYPE: ${{ github.event.inputs.user_type }}
        run: |
          if [ "$USER_TYPE" = "soak" ]; then
            if [ -z "$SOAK_TEST_PASSWORD" ]; then
              echo "❌ Error: SOAK_TEST_PASSWORD is not set."
              echo "Either:"
              echo "  1. Run this workflow with 'Generate new password' checked, OR"
              echo "  2. Manually create the SOAK_TEST_PASSWORD secret in GitHub"
              exit 1
            fi
            node scripts/setup-test-users.mjs
          else
            node -e "
            const { createClient } = require('@supabase/supabase-js');
            
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_SERVICE_KEY,
              { auth: { autoRefreshToken: false, persistSession: false } }
            );
            
            const userType = process.env.USER_TYPE || 'free';
            const email = userType === 'pro' ? 'e2e-pro-user@test.com' : 'e2e-free-user@test.com';
            const password = 'TestPassword123!';
            
            async function setupUser() {
              console.log('🔧 Setting up test user:', email, 'as', userType);
              
              const { data: existingUsers } = await supabase.auth.admin.listUsers();
              const existingUser = existingUsers?.users?.find(u => u.email === email);
              
              let userId;
              
              if (existingUser) {
                console.log('📧 User exists, updating...');
                userId = existingUser.id;
                await supabase.auth.admin.updateUserById(userId, { password });
              } else {
                console.log('📧 Creating new user...');
                const { data, error } = await supabase.auth.admin.createUser({
                  email,
                  password,
                  email_confirm: true
                });
                
                if (error) throw error;
                userId = data.user.id;
              }
              
              const { error: profileError } = await supabase
                .from('user_profiles')
                .upsert({
                  id: userId,
                  subscription_status: userType,
                  updated_at: new Date().toISOString()
                }, { onConflict: 'id' });
              
              if (profileError) {
                console.error('Profile error:', profileError);
              }
              
              console.log('✅ Test user ready:');
              console.log('   Email:', email);
              console.log('   Password: TestPassword123!');
              console.log('   Subscription:', userType);
              console.log('');
              console.log('💡 Add these as GitHub secrets:');
              if (userType === 'free') {
                console.log('   E2E_FREE_EMAIL=' + email);
                console.log('   E2E_FREE_PASSWORD=TestPassword123!');
              } else {
                console.log('   E2E_PRO_EMAIL=' + email);
                console.log('   E2E_PRO_PASSWORD=TestPassword123!');
              }
            }
            
            setupUser().catch(e => { console.error(e); process.exit(1); });
            "
          fi

      - name: Summary
        env:
          USER_TYPE: ${{ github.event.inputs.user_type }}
          GENERATED: ${{ github.event.inputs.generate_password }}
        run: |
          echo "### Test User Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**User Type:** ${{ github.event.inputs.user_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$USER_TYPE" = "soak" ]; then
            if [ "$GENERATED" = "true" ]; then
              echo "✅ **SOAK_TEST_PASSWORD** was auto-generated and saved to GitHub Secrets" >> $GITHUB_STEP_SUMMARY
            fi
            echo "Soak test users created/updated. All passwords synced to shared secret." >> $GITHUB_STEP_SUMMARY
          else
            echo "Check the logs above for the email/password to add as GitHub secrets." >> $GITHUB_STEP_SUMMARY
          fi
