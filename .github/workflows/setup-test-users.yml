name: Setup Test Users

on: 
  workflow_dispatch:
    inputs:
      user_type:
        description: 'User subscription type'
        required: true
        default: 'free'
        type: choice
        options:
          - free
          - pro
          - soak
      soak_action:
        description: 'Soak user action (only for soak type)'
        required: false
        default: 'update_existing'
        type: choice
        options:
          - update_existing
          - generate_new_credentials
      new_free_count:
        description: 'Number of NEW free soak users to create (soak only)'
        required: false
        default: '0'
        type: string
      new_pro_count:
        description: 'Number of NEW pro soak users to create (soak only)'
        required: false
        default: '0'
        type: string

jobs:
  setup-test-user:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate and set SOAK_TEST_PASSWORD
        if: ${{ github.event.inputs.user_type == 'soak' && github.event.inputs.soak_action == 'generate_new_credentials' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔐 Generating new SOAK_TEST_PASSWORD..."
          
          # Generate a secure random password
          NEW_PASSWORD=$(openssl rand -base64 16 | tr -d '/+=' | head -c 20)
          
          # Set it as a GitHub secret
          gh secret set SOAK_TEST_PASSWORD --body "$NEW_PASSWORD"
          echo "✅ SOAK_TEST_PASSWORD secret created/updated via GitHub API"
          
          # Export for use in this workflow run
          echo "SOAK_TEST_PASSWORD=$NEW_PASSWORD" >> $GITHUB_ENV

      - name: Setup test users
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SOAK_TEST_PASSWORD: ${{ env.SOAK_TEST_PASSWORD || secrets.SOAK_TEST_PASSWORD }}
          USER_TYPE: ${{ github.event.inputs.user_type }}
          SOAK_ACTION: ${{ github.event.inputs.soak_action }}
          NEW_FREE_COUNT: ${{ github.event.inputs.new_free_count }}
          NEW_PRO_COUNT: ${{ github.event.inputs.new_pro_count }}
        run: |
          if [ "$USER_TYPE" = "soak" ]; then
            if [ -z "$SOAK_TEST_PASSWORD" ]; then
              echo "❌ Error: SOAK_TEST_PASSWORD is not set."
              echo ""
              echo "Choose one of these options:"
              echo "  1. Run workflow with 'generate_new_credentials' action"
              echo "  2. Manually create SOAK_TEST_PASSWORD secret in GitHub Settings"
              exit 1
            fi
            
            echo "📋 Soak Action: $SOAK_ACTION"
            node scripts/setup-test-users.mjs
          else
            node -e "
            const { createClient } = require('@supabase/supabase-js');
            
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_SERVICE_KEY,
              { auth: { autoRefreshToken: false, persistSession: false } }
            );
            
            const userType = process.env.USER_TYPE || 'free';
            const email = userType === 'pro' ? 'e2e-pro-user@test.com' : 'e2e-free-user@test.com';
            const password = 'TestPassword123!';
            
            async function setupUser() {
              console.log('🔧 Setting up test user:', email, 'as', userType);
              
              const { data: existingUsers } = await supabase.auth.admin.listUsers();
              const existingUser = existingUsers?.users?.find(u => u.email === email);
              
              let userId;
              
              if (existingUser) {
                console.log('📧 User exists, updating...');
                userId = existingUser.id;
                await supabase.auth.admin.updateUserById(userId, { password });
              } else {
                console.log('📧 Creating new user...');
                const { data, error } = await supabase.auth.admin.createUser({
                  email,
                  password,
                  email_confirm: true
                });
                
                if (error) throw error;
                userId = data.user.id;
              }
              
              const { error: profileError } = await supabase
                .from('user_profiles')
                .upsert({
                  id: userId,
                  subscription_status: userType
                }, { onConflict: 'id' });
              
              if (profileError) {
                console.error('Profile error:', profileError);
              }
              
              console.log('✅ Test user ready:');
              console.log('   Email:', email);
              console.log('   Password: TestPassword123!');
              console.log('   Subscription:', userType);
            }
            
            setupUser().catch(e => { console.error(e); process.exit(1); });
            "
          fi

      - name: Summary
        env:
          USER_TYPE: ${{ github.event.inputs.user_type }}
          SOAK_ACTION: ${{ github.event.inputs.soak_action }}
        run: |
          echo "### Test User Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**User Type:** $USER_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$USER_TYPE" = "soak" ]; then
            echo "**Action:** $SOAK_ACTION" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$SOAK_ACTION" = "generate_new_credentials" ]; then
              echo "✅ New SOAK_TEST_PASSWORD generated and saved to GitHub Secrets" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Existing users updated with current SOAK_TEST_PASSWORD" >> $GITHUB_STEP_SUMMARY
            fi
          fi
