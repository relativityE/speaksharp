name: Test User Admin

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'setup'
        type: choice
        options:
          - setup
          - query
          - create
      mode:
        description: 'Target Mode'
        required: false
        default: 'e2e'
        type: choice
        options:
          - e2e
          - soak
      password_action:
        description: 'Password Strategy'
        required: true
        default: 'use_existing'
        type: choice
        options:
          - use_existing
          - generate_new_credentials
      new_basic_count:
        description: 'Basic Users'
        required: false
        default: '0'
        type: string
      new_pro_count:
        description: 'Pro Users'
        required: false
        default: '0'
        type: string
      create_email:
        description: 'Create action only: email'
        required: false
        type: string
      create_password:
        description: 'Create action only: password, or leave blank to use SOAK_TEST_PASSWORD'
        required: false
        type: string
      create_tier:
        description: 'Create action only: user tier'
        required: false
        default: 'free'
        type: choice
        options:
          - free
          - pro

jobs:
  test-user-admin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment

      - name: Generate and set SOAK_TEST_PASSWORD
        if: ${{ github.event.inputs.action == 'setup' && github.event.inputs.password_action == 'generate_new_credentials' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "🔐 Generating new SOAK_TEST_PASSWORD..."
          
          # Generate a secure random password
          NEW_PASSWORD=$(openssl rand -base64 16 | tr -d '/+=' | head -c 20)
          
          # Set it as a GitHub secret
          gh secret set SOAK_TEST_PASSWORD --body "$NEW_PASSWORD"
          echo "✅ SOAK_TEST_PASSWORD secret created/updated via GitHub API"
          
          # Export for use in this workflow run
          echo "SOAK_TEST_PASSWORD=$NEW_PASSWORD" >> $GITHUB_ENV

      - name: Run test user admin action
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SOAK_TEST_PASSWORD: ${{ env.SOAK_TEST_PASSWORD || secrets.SOAK_TEST_PASSWORD }}
          ACTION: ${{ github.event.inputs.action }}
          MODE: ${{ github.event.inputs.mode }}
          NEW_BASIC_COUNT: ${{ github.event.inputs.new_basic_count }}
          NEW_PRO_COUNT: ${{ github.event.inputs.new_pro_count }}
          CREATE_USER_EMAIL: ${{ github.event.inputs.create_email }}
          CREATE_USER_PASSWORD: ${{ github.event.inputs.create_password }}
          CREATE_USER_TIER: ${{ github.event.inputs.create_tier }}
        run: |
          if [ "$ACTION" = "setup" ] && [ -z "$SOAK_TEST_PASSWORD" ]; then
            echo "❌ Error: SOAK_TEST_PASSWORD is not set."
            echo ""
            echo "Choose one of these options:"
            echo "  1. Run workflow with 'generate_new_credentials' password action"
            echo "  2. Manually create SOAK_TEST_PASSWORD secret in GitHub Settings"
            exit 1
          fi
          
          node scripts/setup-test-users.mjs

      - name: Summary
        env:
          ACTION: ${{ github.event.inputs.action }}
          MODE: ${{ github.event.inputs.mode }}
          PASSWORD_ACTION: ${{ github.event.inputs.password_action }}
        run: |
          echo "### Test User Admin Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action:** $ACTION" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** $MODE" >> $GITHUB_STEP_SUMMARY
          echo "**Password Strategy:** $PASSWORD_ACTION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$PASSWORD_ACTION" = "generate_new_credentials" ]; then
            echo "✅ New SOAK_TEST_PASSWORD generated and saved to GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Registry updated with current SOAK_TEST_PASSWORD" >> $GITHUB_STEP_SUMMARY
          fi
