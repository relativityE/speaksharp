name: Production Canary Smoke Test

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # Every day at 5 AM UTC

concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-environment
        with:
          install-playwright: 'true'

      - name: Provision Canary User
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
          # Stable email so provision-canary.mjs reuses ONE account every run (its idempotent
          # create-or-sync pattern) instead of minting a new canary-* user each run and bloating
          # auth.users. The job concurrency guard above (one run per ref, cancel-in-progress) already
          # prevents overlapping runs, so a fixed email is safe.
          CANARY_EMAIL: canary@speaksharp.app
          # Ceiling guard: at most CANARY_MAX canary-like accounts may exist (reuse, never accumulate).
          # Warn-only until the legacy canary-<runid> residue is deleted; flip CANARY_ENFORCE to "fail"
          # afterward so a reappearing stray hard-fails the job.
          CANARY_MAX: '1'
          CANARY_ENFORCE: warn
        run: node scripts/provision-canary.mjs

      - name: Run Smoke Test
        env:
          VITE_TEST_MODE: "true"
          VITE_USE_LIVE_DB: "true"
          CANARY_PASSWORD: ${{ secrets.CANARY_PASSWORD }}
          CANARY_EMAIL: canary@speaksharp.app
          BASE_URL: https://speaksharp-public.vercel.app/
        run: pnpm test:deploy:prod

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: canary-test-results
          path: |
            playwright-report/
            test-results/canary/
          retention-days: 7

      - name: Cleanup Secrets
        if: always()
        run: rm -f .env.development
