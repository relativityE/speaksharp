name: Private model-pipeline smoke (automated)

# B2 — Automated Private model-pipeline smoke (a dependency + deterministic-inference REGRESSION
# GUARD, NOT a release proof). Fetches the pinned v4 base_q4 Private model, initializes it, exercises
# the cache, and runs deterministic inference on a fixed audio fixture, asserting non-empty transcript
# with expected-token overlap. Emits a JSON artifact + job-summary evidence.
#
# THIS DOES NOT PROVE: browser UX, microphone capture, WebGPU, setup/consent UI, or no-audio-egress.
# Those require the manual real-device WebGPU proof (Option A); the browser WASM path is B1.
#
# Non-blocking: workflow_dispatch + weekly schedule only — never a PR-required check (model download
# is slow/network-bound by design).

on:
  workflow_dispatch:
    inputs:
      model_id:
        description: 'Model id to smoke (default: production v4 base_q4 floor)'
        required: false
        default: 'onnx-community/whisper-base.en'
      overlap_threshold:
        description: 'Minimum expected-token overlap to PASS (0..1)'
        required: false
        default: '0.6'
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC — catch model/CDN/package regressions weekly

permissions:
  contents: read

jobs:
  private-model-smoke:
    name: Private model-pipeline smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run Private model-pipeline smoke
        env:
          MODEL_ID: ${{ github.event.inputs.model_id || 'onnx-community/whisper-base.en' }}
          OVERLAP_THRESHOLD: ${{ github.event.inputs.overlap_threshold || '0.6' }}
        run: node scripts/private-model-smoke.mjs

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-model-smoke
          path: private-model-smoke.json
          if-no-files-found: warn
