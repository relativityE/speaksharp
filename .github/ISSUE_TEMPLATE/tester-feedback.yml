name: Tester feedback
description: Capture controlled tester issues when Sentry/PostHog readback is unavailable or incomplete.
title: "[Tester]: "
labels: ["tester-feedback", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for controlled tester trial issues. Include enough detail for release triage without exposing secrets.
  - type: input
    id: tester
    attributes:
      label: Tester identifier
      description: Email, GitHub handle, or assigned tester ID.
    validations:
      required: true
  - type: input
    id: app_url
    attributes:
      label: App URL
      description: Copy the full URL where the issue happened.
      placeholder: "https://speaksharp-public.vercel.app/session"
    validations:
      required: true
  - type: input
    id: release_sha
    attributes:
      label: Release SHA / build identifier
      description: Copy this from the app runtime proof or release notes. If unavailable, write "not visible".
      placeholder: "main@abc1234 or not visible"
    validations:
      required: true
  - type: input
    id: browser_user_agent
    attributes:
      label: Browser / device
      description: Include browser, version, OS, and device if known.
      placeholder: "Chrome 126 on macOS, built-in mic"
    validations:
      required: true
  - type: dropdown
    id: plan_tier
    attributes:
      label: Plan / entitlement
      options:
        - Free
        - Trial
        - Pro
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: flow
    attributes:
      label: Flow
      options:
        - Sign in / sign up
        - Trial / upgrade
        - Native STT
        - Private STT
        - Cloud STT
        - Session save
        - History / analytics
        - AI feedback
        - PDF export
        - Other
    validations:
      required: true
  - type: dropdown
    id: stt_mode
    attributes:
      label: STT mode
      options:
        - Not STT-related
        - Native / Browser
        - Private / Vault
        - Cloud
        - Unknown
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P0 blocks tester from continuing
        - P1 degraded or confusing
        - P2 polish
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open production URL...\n2. Select...\n3. Click..."
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      placeholder: "Expected:\nActual:"
    validations:
      required: true
  - type: input
    id: session_id
    attributes:
      label: Session ID
      description: Optional. Include only if visible in the app/report.
      placeholder: "session id, or blank"
    validations:
      required: false
  - type: input
    id: sentry_event_id
    attributes:
      label: Sentry event ID
      description: Optional. Include only if the app/support flow shows one.
      placeholder: "event id, or blank"
    validations:
      required: false
  - type: dropdown
    id: transcript_opt_in
    attributes:
      label: Transcript opt-in
      description: Transcript text can be sensitive, especially for Private/Vault mode. Choose Yes only if you intentionally pasted transcript text below.
      options:
        - "No transcript text included"
        - "Yes, I intentionally included transcript text for debugging"
    validations:
      required: true
  - type: dropdown
    id: audio_opt_in
    attributes:
      label: Audio opt-in
      description: Audio is never required by default. Choose Yes only if you intentionally attached audio for debugging.
      options:
        - "No audio attached"
        - "Yes, I intentionally attached audio for debugging"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, session time, console/network notes, and optional transcript/audio only if the opt-in fields above say Yes.
    validations:
      required: false
